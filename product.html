<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المنتج | متجر نفس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="product-page">
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-group">
        <a class="brand" href="index.html" aria-label="العودة إلى الصفحة الرئيسة">
          <img src="assets/logo-nafas.png" alt="شعار متجر نفس">
        </a>
        <a class="store-link store-link-profile" href="stores.html" aria-label="الانتقال إلى صفحة المتجر">
          <span class="store-link-text">المتجر</span>
        </a>
      </div>
      <div class="account-menu">
        <button class="account-trigger header-frame-button" type="button" aria-expanded="false" aria-controls="accountDropdown">
          <span class="account-trigger-content">
            <span class="account-label">تسجيل الدخول</span>
          </span>
        </button>

        <div class="dropdown-panel" id="accountDropdown">
          <a href="login.html">إدارة الحساب</a>
          <a href="my-store.html">متجري</a>
          <a href="login.html">المفضلة</a>
          <a href="login.html">تسجيل الخروج</a>
        </div>
      </div>
    </header>

    <main class="product-page-main">
      <section class="product-detail-shell" id="productDetailShell">
        <div class="product-detail-card">
          <div class="product-detail-gallery">
            <div class="product-detail-gallery-main" id="productDetailGalleryMain"></div>
            <div class="product-detail-thumbs" id="productDetailThumbs"></div>
          </div>
        </div>

        <div class="product-detail-card">
          <div class="product-detail-content">
            <h1 id="productDetailName"></h1>
            <p id="productDetailDescription"></p>
            <div class="product-detail-meta">
              <span id="productStoreName"></span>
              <span id="productRatingSummary">لا يوجد تقييم بعد</span>
            </div>
            <strong class="product-price" id="productDetailPrice"></strong>
            <a class="whatsapp-btn" id="productWhatsappLink" href="#" target="_blank" rel="noopener noreferrer">واتس أب</a>
          </div>
        </div>
      </section>

      <section class="product-detail-shell">
        <div class="product-review-card">
          <h2>أضف تقييمك وتعليقك</h2>
          <form class="review-form" id="reviewForm">
            <select id="reviewRating" required>
              <option value="">اختر التقييم</option>
              <option value="5">5</option>
              <option value="4">4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1</option>
            </select>
            <textarea id="reviewComment" rows="4" placeholder="اكتب تعليقك على المنتج" required></textarea>
            <button class="primary-btn" type="submit">حفظ التقييم</button>
          </form>
        </div>

        <div class="product-review-card">
          <h2>التعليقات والتقييمات</h2>
          <p id="reviewEmpty">لا يوجد تقييمات لهذا المنتج حتى الآن.</p>
          <div class="reviews-list" id="productReviewsList"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>متجر نفس</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
